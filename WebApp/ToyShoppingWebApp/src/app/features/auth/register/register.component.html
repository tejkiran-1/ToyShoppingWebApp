<div class="register-container">
    <div class="register-box">
        <h1>📝 Register</h1>
        
        <div *ngIf="errorMessage" class="error-message">
            ❌ {{ errorMessage }}
        </div>

        <form (ngSubmit)="onRegister()">
            <div class="form-group">
                <label>Username:</label>
                <input [(ngModel)]="username" name="username" placeholder="Enter username" required />
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" [(ngModel)]="email" name="email" placeholder="Enter email" required />
            </div>

            <div class="form-group">
                <label>Password:</label>
                <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" required />
            </div>

            <div class="form-group">
                <label>Confirm Password:</label>
                <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required />
            </div>

            <button type="submit" [disabled]="isLoading">
                {{ isLoading ? '⏳ Registering...' : 'Register' }}
            </button>
        </form>

        <p class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>
</div>
